<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none';
               img-src ${cspSource} https:;
               style-src ${cspSource} 'unsafe-inline';
               script-src ${cspSource};">
    <link rel="stylesheet" href="${styleUri}">
</head>
<body>
    <div id="container">
        <div id="toolbar">
            <button data-widget="Button"><img src="${iconButton}"></button>
            <button data-widget="Checkbutton"><img src="${iconCheckbutton}"></button>
            <button data-widget="Label"><img src="${iconLabel}"></button>
            <button data-widget="Frame"><img src="${iconFrame}"></button>
            <button data-widget="Entry"><img src="${iconEntry}"></button>
            <button data-widget="Radiobutton"><img src="${iconRadiobutton}"></button>
            <button data-widget="Text"><img src="${iconText}"></button>
            <button data-widget="Scale"><img src="${iconScale}"></button>
            <button data-widget="Notebook"><img src="${iconNotebook}"></button>
            <button id="save-button">保存</button>
            <button id="load-button">読込</button>
        </div>
        <div id="property-panel"></div>
        <canvas id="designer-canvas"></canvas>
        <div id="widget-tree"></div>
    </div>
    <script src="${scriptUri}"></script>
</body>
</html>
